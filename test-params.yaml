genomes_tsv: "/exports/eddie/scratch/s2428892/wgd-nextflow/testdata/genomes.tsv"

working_dir: "workingDir_test"
postdir: "post_genespace_test"

gff_dir: "/exports/eddie/scratch/s2428892/wgd-nextflow/testdata/gff_truncated"
protein_dir: "/exports/eddie/scratch/s2428892/wgd-nextflow/testdata/protein"
cds_dir: "/exports/eddie/scratch/s2428892/wgd-nextflow/testdata/cds"
chr_dict_dir: "/exports/eddie/scratch/s2428892/wgd-nextflow/testdata/chr_dict"

ext:
  gff: "gff3"
  pep: "pep"

orthofinder_bin: "orthofinder"
macse_bin: "macse"
iqtree_bin: "iqtree3"
alerax_bin: "alerax"

start_mode: "genespace"
existing_genespace_wd: "/exports/eddie/scratch/s2428892/wgd-nextflow"
existing_orthofinder_dir: null

force_orthofinder: false
run_external_orthofinder: true
orthofinder_analysis_threads: 2

genespace:
  rawOrthofinderDir: ""
  blkSize: 5
  orthofinder_in_blk: true

require_outgroup_og: true
collapse_tandems: true

array_size: 10000

sif_paths:
  genespace: "/exports/cmvm/eddie/eb/groups/macqueen_lab/brianna/containers/genespace_1.1.sif"
  macse: "/exports/cmvm/eddie/eb/groups/macqueen_lab/brianna/containers/macse_1.0.sif"
  iqtree: "/exports/cmvm/eddie/eb/groups/macqueen_lab/brianna/containers/iqtree_1.0.sif"
  alerax: "/exports/cmvm/eddie/eb/groups/macqueen_lab/brianna/containers/alerax_1.0.sif"

species_tree: "/exports/eddie/scratch/s2428892/wgd-nextflow/testdata/species_tree.nwk"
use_species_tree_for_orthofinder: true
use_species_tree_for_alerax: true

run_alerax: true

alerax:
  cleanup_output: true

  models:
    - model_id: "DL_global"
      rec_model: "UndatedDL"
      model_parametrization: "GLOBAL"
      gene_tree_samples: 10

    - model_id: "DL_perSpecies"
      rec_model: "UndatedDL"
      model_parametrization: "PER-SPECIES"
      gene_tree_samples: 10

    - model_id: "DTL_global"
      rec_model: "UndatedDTL"
      model_parametrization: "GLOBAL"
      gene_tree_samples: 10

    - model_id: "DTL_perSpecies"
      rec_model: "UndatedDTL"
      model_parametrization: "PER-SPECIES"
      gene_tree_samples: 10
